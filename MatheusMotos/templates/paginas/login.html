{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MMotos</title>

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="backgroundCd">

<div class="auth-container">

    <div class="auth-card">
        <a href="/" class="logoCd">Login</a>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                {{ form.email.label_tag }}
                {{ form.email }}
            </div>

            <div class="form-group">
                {{ form.password.label_tag }}
                {{ form.password }}
            </div>

            <label>
                <input type="checkbox">
                Lembrar de mim
            </label>

            <a href="#">
                Esqueci minha senha
            </a>

            <button type="submit" class="btn-auth">
                Entrar
            </button>

            <p class="auth-link">
                Não possui conta?
                <a href="{% url 'cadastro' %}">
                    Cadastre-se
                </a>
            </p>

        </form>
    </div>

</div>

</body>
</html>
